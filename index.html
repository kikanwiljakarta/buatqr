<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code Generator</title>

  <!-- FAVICON -->
  <link rel="icon" href="logoQR.png" type="image/png">

  
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
    }

    input, button {
      width: 100%;
      max-width: 500px;
      padding: 12px;
      margin-bottom: 10px;
      font-size: 16px;
    }

    #qr-wrapper {
      width: 100%;
      max-width: 500px;
      background: white;
      border: 10px white;
      box-sizing: border-box;
      text-align: center;
    }

    canvas {
      width: 100%;
      height: auto;
      display: block;
    }

    #qr-text {
      font-size: 30px;
      font-weight: bold;
      padding: 10px;
      word-break: break-word;
    }
  </style>
</head>

<body>

  <h3>QR Code Generator</h3>

  <input type="text" id="text" placeholder="Masukkan teks...">
  <button onclick="generateQR()">Buat QR</button>

  <div id="qr-wrapper">
    <canvas id="qrcode"></canvas>
    <div id="qr-text"></div>
  </div>

  <script>
    function generateQR() {
      const text = document.getElementById("text").value;
      const canvas = document.getElementById("qrcode");
      const textDisplay = document.getElementById("qr-text");

      if (!text) {
        alert("Teks tidak boleh kosong!");
        return;
      }

      const size = document.getElementById("qr-wrapper").offsetWidth - 20;

      QRCode.toCanvas(canvas, text, {
        width: size,
        margin: 1
      }, function (error) {
        if (error) console.error(error);
      });

      // tampilkan teks di bawah QR
      textDisplay.textContent = text;
    }
  </script>

</body>
</html>
